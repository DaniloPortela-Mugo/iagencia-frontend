<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Escolha o Cliente</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='pagina2-clientes.css') }}">
</head>
<body>
  <header>
    <div class="logo">Logo</div>
    <div class="logo" style="visibility: hidden;">Logo 2</div>
  </header>

  <main class="main-container selecao-clientes">
    <h1>Bem-vindo!</h1>
    <h2>Escolha um cliente para iniciar o atendimento:</h2>

    <div class="grid-clientes">
      {% for cliente in clientes %}
        <a href="{{ cliente.chat_link }}" class="cliente-item">
          <img src="{{ cliente.imagem_url }}" alt="{{ cliente.nome }}" style="max-width: 100%; max-height: 100px;">
          <div>{{ cliente.nome }}</div>
        </a>
      {% endfor %}
    </div>
  </main>

  <footer>
    <div style="visibility: hidden;"></div>
    <div class="logo">LOGO 2</div>
  </footer>
</body>
</html>
